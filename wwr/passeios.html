<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rafting | Passeios</title>
  <link rel="stylesheet" href="rafting.css">
</head>

<body>

<header>
  <nav>
    <a href="index.html">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="passeios.html">Passeios</a>
    <a href="contato.html">Contato</a>
  </nav>
</header>

<main>

  <!-- HERO SIMPLES (usa seu CSS existente) -->
  <section class="hero">
    <img src="images/hero.jpg" alt="Passeios de rafting">
    <h1>Nossos Passeios</h1>
  </section>

  <!-- CHAMADA PARA CONTATO -->
  <section>
    <h2>Quer reservar um passeio?</h2>
    <p>Entre em contato e viva essa aventura com a gente!</p>
    <a href="contato.html">Fale Conosco</a>
  </section>

  <!-- PASSEIOS USANDO SEU CSS (bloco_imagens) -->
  <section class="bloco_imagens">

    <figure>
      <img src="images/p1.jpg" alt="Rio calmo">
      <figcaption>
        <h3>Rio Calmo</h3>
        <p>Ideal para iniciantes e famílias.</p>
      </figcaption>
    </figure>

    <figure>
      <img src="images/p2.jpg" alt="Correnteza média">
      <figcaption>
        <h3>Correnteza Média</h3>
        <p>Equilíbrio entre emoção e segurança.</p>
      </figcaption>
    </figure>

    <figure>
      <img src="images/p3.jpg" alt="Rafting extremo">
      <figcaption>
        <h3>Rafting Extremo</h3>
        <p>Para aventureiros experientes.</p>
      </figcaption>
    </figure>

  </section>

  <!-- TABELA DE PASSEIOS -->
  <section>
    <h2>Tabela de Passeios</h2>

    <table>
      <tr>
        <th>Passeio</th>
        <th>Nível</th>
        <th>Duração</th>
      </tr>

      <tr>
        <td>Rio Calmo</td>
        <td>Iniciante</td>
        <td>2h</td>
      </tr>

      <tr>
        <td>Correnteza Média</td>
        <td>Intermediário</td>
        <td>3h</td>
      </tr>

      <tr>
        <td>Rafting Extremo</td>
        <td>Avançado</td>
        <td>4h</td>
      </tr>
    </table>
  </section>

</main>

<footer>
  <p>&copy; 2026 Rafting</p>
</footer>

</body>
</html>
